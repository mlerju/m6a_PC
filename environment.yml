name: rnaseq
channels:
  - conda-forge
  - bioconda
dependencies:
  - python>=3.11
  # Data handling
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.10
  # Plotting
  - matplotlib>=3.7
  - seaborn>=0.12
  - pillow>=10.0        # PIL.Image — used for compositing figures
  - adjusttext>=0.8     # non-overlapping scatter labels
  # Statistics
  - statsmodels>=0.14   # multipletests (BH-FDR)
  - scikit-learn>=1.3   # LogisticRegression, StandardScaler (LR weight derivation)
  # Survival analysis
  - lifelines>=0.27     # KaplanMeierFitter, CoxPHFitter, logrank_test
  # R kernel (IGF2BP rescue script)
  - r-base>=4.3
  - bioconductor-oligo  # extract_mhspc_m6a.R microarray normalisation
